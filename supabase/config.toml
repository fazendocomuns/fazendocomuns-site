# Fazendo Comuns — Supabase local config
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "fazendo-comuns"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000",
  "http://localhost:3000/admin",
  "http://localhost:3000/admin/reset-password",
  "https://fazendocomuns.vercel.app",
  "https://fazendocomuns.vercel.app/admin",
  "https://fazendocomuns.vercel.app/admin/reset-password",
  "https://fazendocomuns-fazendo-comuns.vercel.app",
  "https://fazendocomuns-fazendo-comuns.vercel.app/admin",
  "https://fazendocomuns-git-main-fazendo-comuns.vercel.app",
]
jwt_expiry = 3600
enable_signup = false

[auth.email]
enable_signup = false
enable_confirmations = true
# Login por e-mail/senha deve permanecer habilitado no Dashboard
# (Authentication → Providers → Email). Signup público continua off.
